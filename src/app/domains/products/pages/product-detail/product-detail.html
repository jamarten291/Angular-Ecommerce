@let data = product();
@let image = cover();

@if (data) {
  <div class="w-full flex space-x-10">
    <div class="flex flex-col w-1/3">
      <div class="w-full rounded border border-gray-200">
        <div class="relative h-96">
          <img
            alt="ecommerce"
            class="w-full object-cover object-center"
            [ngSrc]="image ?? ''"
            [fill]="true"
            loading="lazy"
          />
        </div>
      </div>
      <div class="flex items-center justify-center mt-1">
        <div class="grid grid-cols-3 gap-1">
          @for (image of data.images; track $index) {
            <img
              tabindex="0"
              role="button"
              alt="ecommerce"
              class="object-cover object-center rounded border-2 border-gray-200"
              [ngSrc]="image"
              width="80"
              height="80"
              loading="lazy"
              (click)="changeCoverImage(image)"
              (keydown.enter)="changeCoverImage(image)"
              [class.border-red-400]="image === cover()"
            />
          }
        </div>
      </div>
    </div>
    <div class="mt-5 w-full">
      <h2 class="text-sm title-font text-gray-500 tracking-widest">
        {{ data.category.name | uppercase }}
      </h2>
      <h1 class="text-gray-900 text-3xl title-font font-medium mb-1">
        {{ data.title }}
      </h1>
      <p class="leading-relaxed">
        {{ data.description }}
      </p>
      <p class="title-font font-medium text-2xl text-gray-900 mt-5">
        {{ data.price | currency: '€' }}
      </p>
      <button
        class="flex text-white bg-red-500 border-0 py-2 px-6 focus:outline-none hover:bg-red-600 hover:cursor-pointer rounded"
        (click)="addToCart()"
      >
        Add To Cart
      </button>
    </div>
  </div>
}
